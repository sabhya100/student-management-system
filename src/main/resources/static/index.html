<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f7fb;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 180px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 14px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        button:hover {
            background: #1d4ed8;
        }

        .delete-btn {
            background: #dc2626;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #2563eb;
            color: white;
        }

        #message {
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<h1>Student Management System</h1>

<div class="card">
    <h2>Add Student</h2>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="course" placeholder="Course">
    <input id="phone" placeholder="Phone">

    <button id="saveButton" onclick="saveStudent()">Add Student</button>
    <button id="cancelButton" onclick="cancelEdit()" style="display: none;">Cancel Edit</button>

    <p id="message"></p>
</div>

<div class="card">
    <h2>Students</h2>

    <button onclick="loadStudents()">Refresh Students</button>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
    </table>
</div>

<script>
    const API_URL = "/students";
    let editingStudentId = null;

    async function loadStudents() {
        const response = await fetch(API_URL);
        const students = await response.json();

        const tableBody = document.getElementById("studentTableBody");
        tableBody.innerHTML = "";

        students.forEach(student => {
            tableBody.innerHTML += `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.course}</td>
                    <td>${student.phone}</td>
                    <td>
                        <button onclick="editStudent(${student.id}, '${student.name}', '${student.email}', '${student.course}', '${student.phone}')">
                            Edit
                        </button>
                        <button class="delete-btn" onclick="deleteStudent(${student.id})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    async function saveStudent() {
        const student = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            course: document.getElementById("course").value,
            phone: document.getElementById("phone").value
        };

        const message = document.getElementById("message");

        let url = API_URL;
        let method = "POST";

        if (editingStudentId !== null) {
            url = `${API_URL}/${editingStudentId}`;
            method = "PUT";
        }

        const response = await fetch(url, {
            method: method,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(student)
        });

        if (response.ok) {
            message.style.color = "green";
            message.textContent = editingStudentId === null
                ? "Student added successfully."
                : "Student updated successfully.";

            cancelEdit();
            loadStudents();
        } else {
            const errors = await response.json();
            message.style.color = "red";
            message.textContent = Object.values(errors).join(" | ");
        }
    }

    function editStudent(id, name, email, course, phone) {
        editingStudentId = id;

        document.getElementById("name").value = name;
        document.getElementById("email").value = email;
        document.getElementById("course").value = course;
        document.getElementById("phone").value = phone;

        document.getElementById("saveButton").textContent = "Update Student";
        document.getElementById("cancelButton").style.display = "inline-block";
        document.getElementById("message").textContent = `Editing student ID ${id}`;
        document.getElementById("message").style.color = "#2563eb";
    }

    function cancelEdit() {
        editingStudentId = null;

        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("course").value = "";
        document.getElementById("phone").value = "";

        document.getElementById("saveButton").textContent = "Add Student";
        document.getElementById("cancelButton").style.display = "none";
    }

    async function deleteStudent(id) {
        const response = await fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        });

        if (response.ok) {
            if (editingStudentId === id) {
                cancelEdit();
            }
            loadStudents();
        } else {
            alert("Could not delete student.");
        }
    }

    loadStudents();
</script>

</body>
</html>
